version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: roadcheck-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-roadcheck}
      DB_USERNAME: ${POSTGRES_USER:-roadcheck}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-roadcheck}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BLOCKCHAIN_RPC_URL: http://ganache:8545
      SERVER_PORT: 8081
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - roadcheck-network

  nginx:
    image: nginx:1.27-alpine
    container_name: roadcheck-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./src/main/resources/nginx/nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - roadcheck-network

  db:
    image: postgres:15-alpine
    container_name: roadcheck-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roadcheck}
      POSTGRES_USER: ${POSTGRES_USER:-roadcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadcheck}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadcheck} -d ${POSTGRES_DB:-roadcheck}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roadcheck-network

  redis:
    image: redis:7-alpine
    container_name: roadcheck-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - roadcheck-network

  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: roadcheck-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: ${REDIS_UI_USER:-admin}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD:-admin}
    ports:
      - "${REDIS_UI_PORT:-8082}:8081"
    depends_on:
      - redis
    networks:
      - roadcheck-network

  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: roadcheck-ganache
    restart: unless-stopped
    ports:
      - "8545:8545"
    command:
      - "--account=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80,100000000000000000000"
      - "--host=0.0.0.0"
      - "--port=8545"
    networks:
      - roadcheck-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: roadcheck-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_HTTP_PORT:-9000}:9000"
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - roadcheck-network

networks:
  roadcheck-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
  portainer_data: