version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: roadcheck-general-nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - db
      - redis
    networks:
      - roadcheck-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:15-alpine
    container_name: roadcheck-general-postgres-local
    environment:
      POSTGRES_DB: roadcheck
      POSTGRES_USER: roadcheck
      POSTGRES_PASSWORD: roadcheck
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - roadcheck-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadcheck -d roadcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roadcheck-general-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - roadcheck-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: roadcheck-ganache-local
    command:
      - "--account=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80,100000000000000000000"
      - "--host=0.0.0.0"
      - "--port=8545"
    ports:
      - "8545:8545"
    networks:
      - roadcheck-network
    restart: unless-stopped

networks:
  roadcheck-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
